name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        run: |
          # Download and install Android SDK commandline tools
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm commandlinetools-linux-11076708_latest.zip
          
          # Accept licenses and install components
          yes | sdkmanager --licenses
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"
          
          # Persist to subsequent steps
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Decode Android keystore or generate one
        env:
          KEYSTORE_SECRET: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p frontend-vue/android/app
          
          # Check if the keystore secret is provided
          if [ -z "$KEYSTORE_SECRET" ]; then
            echo "Warning: ANDROID_KEYSTORE_BASE64 secret not set"
            echo "Generating a debug keystore for testing..."
            
            keytool -genkey -v -keystore frontend-vue/android/app/build-keystore.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias builditutor \
              -storepass builditutor \
              -keypass builditutor \
              -dname "CN=Build IT, O=Build IT, L=Local, ST=Local, C=US"
          else
            echo "Decoding keystore from secret..."
            if echo "$KEYSTORE_SECRET" | base64 --decode > frontend-vue/android/app/build-keystore.jks 2>/dev/null; then
              if [ -s frontend-vue/android/app/build-keystore.jks ]; then
                echo "Successfully decoded keystore from secret"
              else
                echo "Decoded file is empty, generating debug keystore..."
                rm -f frontend-vue/android/app/build-keystore.jks
                keytool -genkey -v -keystore frontend-vue/android/app/build-keystore.jks \
                  -keyalg RSA -keysize 2048 -validity 10000 \
                  -alias builditutor \
                  -storepass builditutor \
                  -keypass builditutor \
                  -dname "CN=Build IT, O=Build IT, L=Local, ST=Local, C=US"
              fi
            else
              echo "Base64 decoding failed, generating debug keystore..."
              rm -f frontend-vue/android/app/build-keystore.jks
              keytool -genkey -v -keystore frontend-vue/android/app/build-keystore.jks \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -alias builditutor \
                -storepass builditutor \
                -keypass builditutor \
                -dname "CN=Build IT, O=Build IT, L=Local, ST=Local, C=US"
            fi
          fi
          
          ls -lh frontend-vue/android/app/build-keystore.jks
          ls -lh frontend-vue/android/app/build-keystore.jks

      - name: Install frontend dependencies
        run: |
          cd frontend-vue
          npm ci

      - name: Build web resources
        run: |
          cd frontend-vue
          npm run build:web

      - name: Sync and build Android APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'builditutor' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'builditutor' }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'builditutor' }}
        run: |
          cd frontend-vue
          npx cap add android || true
          npx cap sync android
          chmod +x android/gradlew || true
          
          npx cap build android -- \
            --keystorepath=android/app/build-keystore.jks \
            --keystorepass="$KEYSTORE_PASSWORD" \
            --keystorealias="$KEY_ALIAS" \
            --keystorealiaspass="$KEY_PASSWORD"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-it-apk
          path: frontend-vue/android/app/build/outputs/apk/release/*.apk
