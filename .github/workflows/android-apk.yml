name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
  release:
    types: [published]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        run: |
          # Download and install Android SDK commandline tools
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm commandlinetools-linux-11076708_latest.zip
          
          # Accept licenses and install components
          yes | sdkmanager --licenses
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"
          
          # Persist to subsequent steps
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Decode Android keystore or generate one
        run: |
          # Placeholder step - keystore will be created/restored in build step
          echo "Keystore handling will occur during build step"

      - name: Install frontend dependencies
        run: |
          cd frontend-vue
          npm ci

      - name: Build web resources
        run: |
          cd frontend-vue
          npm run build:web

      - name: Sync and build Android APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'builditutor' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'builditutor' }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'builditutor' }}
          KEYSTORE_SECRET: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          cd frontend-vue
          if [ ! -d android ]; then
            npx cap add android
          fi
          if [ ! -f android/gradlew ]; then
            echo "Android gradle wrapper missing; recreating platform"
            rm -rf android
            npx cap add android
          fi
          
          # Restore keystore after platform recreation
          if [ ! -f android/app/build-keystore.jks ]; then
            echo "Restoring keystore file..."
            if [ -z "$KEYSTORE_SECRET" ] || [ "$KEYSTORE_SECRET" = "" ]; then
              echo "No keystore secret provided; generating debug keystore..."
              keytool -genkey -v -keystore android/app/build-keystore.jks \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -alias builditutor \
                -storepass builditutor \
                -keypass builditutor \
                -dname "CN=Build IT, O=Build IT, L=Local, ST=Local, C=US"
            else
              echo "Attempting to decode keystore from secret..."
              if echo "$KEYSTORE_SECRET" | base64 --decode 2>/dev/null > android/app/build-keystore.jks; then
                if [ -s android/app/build-keystore.jks ]; then
                  echo "Successfully decoded keystore"
                else
                  echo "Decoded keystore is empty; generating debug keystore..."
                  rm -f android/app/build-keystore.jks
                  keytool -genkey -v -keystore android/app/build-keystore.jks \
                    -keyalg RSA -keysize 2048 -validity 10000 \
                    -alias builditutor \
                    -storepass builditutor \
                    -keypass builditutor \
                    -dname "CN=Build IT, O=Build IT, L=Local, ST=Local, C=US"
                fi
              else
                echo "Base64 decode failed; generating debug keystore..."
                rm -f android/app/build-keystore.jks
                keytool -genkey -v -keystore android/app/build-keystore.jks \
                  -keyalg RSA -keysize 2048 -validity 10000 \
                  -alias builditutor \
                  -storepass builditutor \
                  -keypass builditutor \
                  -dname "CN=Build IT, O=Build IT, L=Local, ST=Local, C=US"
              fi
            fi
          fi
          
          chmod +x android/gradlew
          npx cap sync android
          
          # Verify keystore exists before build
          if [ ! -f android/app/build-keystore.jks ]; then
            echo "ERROR: Keystore not found at android/app/build-keystore.jks"
            ls -la android/app/
            exit 1
          fi
          
          echo "Keystore file exists:"
          ls -lh android/app/build-keystore.jks
          
          npx cap build android --androidreleasetype APK
          
          echo "Validating generated APK..."
          unzip -l android/app/build/outputs/apk/release/app-release.apk
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" verify --verbose android/app/build/outputs/apk/release/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-it-apk
          path: frontend-vue/android/app/build/outputs/apk/release/*.apk

      - name: Upload APK to GitHub Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: frontend-vue/android/app/build/outputs/apk/release/app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive
