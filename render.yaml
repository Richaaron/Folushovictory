services:
  # 1. Node.js Backend
  - type: web
    name: folushovictory-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # 2. Flask Frontend
  - type: web
    name: folushovictoryschool
    runtime: python
    rootDir: frontend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: BACKEND_URL
        fromService:
          name: folushovictory-backend
          type: web
          property: host
      - key: FLASK_SECRET_KEY
        generateValue: true
