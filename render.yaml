services:
  # 1. Node.js Backend
  - type: web
    name: folushovictory-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 4000
      - key: FRONTEND_ORIGIN
        value: https://folushovictoryschool.onrender.com
      - fromGroup: fvs-secrets

  # 2. Vue 3 Frontend (Static Site)
  - type: static
    name: folushovictoryschool
    rootDir: frontend-vue
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://folushovictory-backend.onrender.com
