services:
  # 1. Node.js Backend
  - type: web
    name: folushovictory-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - fromGroup: fvs-secrets

  # 2. Flask Frontend
  - type: web
    name: folushovictoryschool
    runtime: python
    rootDir: frontend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: BACKEND_URL
        value: https://folushovictory-backend.onrender.com
      - fromGroup: fvs-secrets
