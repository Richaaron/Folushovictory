<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <title>{{ title or "Folusho Victory Schools" }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      .fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media print {
        .no-print {
          display: none !important;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen">
    <header class="no-print bg-[#0B6E4F] py-6 shadow-lg shadow-emerald-900/10">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4">
        <a href="/" class="flex items-center gap-4 transition hover:opacity-90">
          <img src="{{ url_for('static', filename='logo.svg') }}" alt="Logo" class="h-10 w-10" />
          <div class="text-lg font-black tracking-tight text-white">FOLUSHO VICTORY</div>
        </a>
        <div class="flex items-center gap-4">
          {% if session.get('user') %}
            <div class="hidden sm:block text-[10px] font-black uppercase tracking-widest text-emerald-100">
              Session: {{ session.get('user', {}).get('username') }}
            </div>
            <a class="flex items-center gap-2 rounded-xl bg-white/10 px-4 py-2.5 text-xs font-black uppercase tracking-wider text-white transition hover:bg-white/20" 
               href="{{ url_for('settings') }}">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
              Settings
            </a>
            <a class="rounded-xl bg-[#D4AF37] px-5 py-2.5 text-xs font-black uppercase tracking-wider text-slate-900 shadow-md shadow-amber-900/20 transition hover:bg-[#c4a030] active:scale-95" 
               href="{{ url_for('logout') }}">
              Logout
            </a>
          {% endif %}
        </div>
      </div>
    </header>
    <main class="fade-in mx-auto max-w-6xl px-4 py-10">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="no-print mb-8 space-y-3">
            {% for msg in messages %}
              <div class="flex items-center gap-3 rounded-2xl border border-emerald-100 bg-white p-4 shadow-sm">
                <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-emerald-50 text-emerald-600">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="text-sm font-bold text-slate-700">{{ msg }}</div>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
