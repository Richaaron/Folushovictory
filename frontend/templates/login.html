{% extends "base.html" %}
{% block content %}
  <div class="flex min-h-[70vh] items-center justify-center p-4">
    <div class="w-full max-w-md academic-card rounded-[2.5rem] p-10">
      <div class="mb-10 text-center">
        <div class="mb-6 flex justify-center">
          <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="h-20 w-20 object-contain drop-shadow-xl" />
        </div>
        <div class="inline-block rounded-full bg-purple-50 px-5 py-2 text-[10px] font-black tracking-[0.2em] text-royal-purple uppercase border border-purple-100">
          {{ portal }} Portal
        </div>
        <h1 class="mt-6 text-4xl font-black tracking-tight text-slate-900 leading-tight">Welcome Back</h1>
        <p class="mt-2 text-sm font-medium text-slate-500">Secure entry to the academic portal.</p>
      </div>
      <form method="post" class="space-y-6">
        <div>
          <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Username</label>
          <input name="username" placeholder="e.g. admin_fvs"
            class="w-full rounded-2xl border border-slate-100 bg-slate-50 px-5 py-4 text-sm transition focus:border-royal-purple focus:bg-white focus:outline-none focus:ring-4 focus:ring-purple-50" 
            required autofocus />
        </div>
        <div>
          <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Password</label>
          <input name="password" type="password" placeholder="••••••••"
            class="w-full rounded-2xl border border-slate-100 bg-slate-50 px-5 py-4 text-sm transition focus:border-royal-purple focus:bg-white focus:outline-none focus:ring-4 focus:ring-purple-50" 
            required />
        </div>
        <button class="w-full rounded-2xl purple-gradient py-5 text-sm font-black uppercase tracking-widest text-white shadow-xl shadow-purple-200 transition hover:scale-[1.02] hover:shadow-purple-300 active:scale-[0.98]">
          Authorize Access
        </button>
      </form>
      <div class="mt-10 border-t border-slate-100 pt-8 text-center text-[10px] font-bold uppercase tracking-widest text-slate-400">
        Folusho Victory Schools &copy; 2026
      </div>
    </div>
  </div>
      <div class="mt-8 border-t border-slate-100 pt-6 text-center text-xs text-slate-400">
        Folusho Victory Schools &copy; 2026. Secure Access.
      </div>
    </div>
  </div>
{% endblock %}
