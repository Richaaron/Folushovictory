{% extends "base.html" %}
{% block content %}
  <div class="flex min-h-[70vh] items-center justify-center">
    <div class="w-full max-w-md overflow-hidden rounded-3xl bg-white p-10 shadow-2xl ring-1 ring-slate-200">
      <div class="mb-8 text-center">
        <div class="inline-block rounded-full bg-emerald-50 px-4 py-1.5 text-xs font-bold tracking-widest text-[#0B6E4F] uppercase">
          {{ portal }} Portal
        </div>
        <h1 class="mt-4 text-3xl font-extrabold text-slate-900">Sign in</h1>
        <p class="mt-2 text-sm text-slate-500">Please enter your credentials to continue.</p>
      </div>
      <form method="post" class="space-y-6">
        <div>
          <label class="block text-sm font-bold text-slate-700">Username</label>
          <div class="mt-1">
            <input name="username" placeholder="Enter username"
              class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm transition focus:border-[#0B6E4F] focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-100" 
              required autofocus />
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700">Password</label>
          <div class="mt-1">
            <input name="password" type="password" placeholder="••••••••"
              class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm transition focus:border-[#0B6E4F] focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-100" 
              required />
          </div>
        </div>
        <button class="w-full rounded-xl bg-[#0B6E4F] py-4 text-sm font-bold text-white shadow-lg shadow-emerald-100 transition hover:bg-[#095c41] active:scale-[0.98]">
          Authenticate
        </button>
      </form>
      <div class="mt-8 border-t border-slate-100 pt-6 text-center text-xs text-slate-400">
        Folusho Victory Schools &copy; 2026. Secure Access.
      </div>
    </div>
  </div>
{% endblock %}
